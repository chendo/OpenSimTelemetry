<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSimTelemetry</title>
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>
    <style>
/* __STYLES__ */
    </style>
</head>
<body>
    <!-- Drop overlay (shown when dragging .ibt over page) -->
    <div class="drop-overlay" id="drop-overlay">
        <div class="drop-overlay-content">
            <div class="drop-overlay-icon">&#128190;</div>
            <div class="drop-overlay-text">Drop .ibt file to start replay</div>
            <div class="drop-overlay-hint">iRacing telemetry files supported</div>
        </div>
    </div>

    <!-- Upload progress overlay -->
    <div class="upload-overlay" id="upload-overlay">
        <div class="upload-progress">
            <div class="upload-spinner"></div>
            <div id="upload-status">Uploading .ibt file...</div>
            <div class="upload-progress-bar"><div class="upload-progress-fill" id="upload-progress-fill"></div></div>
        </div>
    </div>

    <header class="header-bar">
        <span class="header-logo">
            <span class="logo-open">OPEN</span><span class="logo-sim">SIM</span><span class="logo-tel">TELEMETRY</span>
            <span class="mode-badge" id="mode-badge" style="display:none"></span>
        </span>
        <div class="remote-source">
            <span class="remote-label" id="remote-label">Connected to</span>
            <input type="text" class="remote-input" id="remote-url" value="http://localhost:9100" title="OST server endpoint">
            <button class="remote-connect-btn" id="remote-connect" style="display:none">Connect</button>
        </div>
        <div class="header-right">
            <span class="header-conn" id="header-conn">
                <span class="status-dot dot-inactive"></span>
                <span>Connecting...</span>
            </span>
            <span class="header-throughput" id="header-throughput"></span>
            <span class="header-memory" id="header-memory"></span>
            <span class="recording-dot" id="recording-dot" title="Auto-save active"></span>
            <div class="header-dropdown" id="data-dropdown">
                <button class="header-reset-btn header-dropdown-btn" id="data-btn">Data &#9662;</button>
                <div class="header-dropdown-menu" id="data-menu">
                    <div class="dropdown-section-title">Sources</div>
                    <div id="sources-menu"></div>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" id="menu-load-ibt">Load .ibt</button>
                    <button class="dropdown-item" id="menu-browse-replays">Replays</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" id="menu-export-data">Export Data</button>
                </div>
            </div>
            <input type="file" id="ibt-file-input" accept=".ibt" style="display:none">
            <button class="header-reset-btn" id="menu-add-graph">+ Graph</button>
            <button class="header-reset-btn" id="header-computed-metrics">f(x)</button>
            <button class="header-reset-btn" id="header-reset-layout">Reset Layout</button>
            <button class="header-reset-btn" id="settings-btn">Settings</button>
        </div>
    </header>

    <!-- Session status bar (sticky below header) -->
    <div class="session-bar" id="session-bar">
        <div class="session-bar-info" id="session-bar-info"><span style="color:var(--text-muted)">Waiting for data...</span></div>
        <div class="session-bar-timing">
            <span class="timing-item"><span class="timing-label">CUR</span> <span class="timing-value" id="sb-cur">--:--.---</span></span>
            <span class="timing-item timing-best"><span class="timing-label">BEST</span> <span class="timing-value" id="sb-best">--:--.---</span></span>
            <span class="timing-item"><span class="timing-label">LAST</span> <span class="timing-value" id="sb-last">--:--.---</span></span>
            <span class="timing-item"><span class="timing-label">LAP</span> <span class="timing-value" id="sb-lap">--</span></span>
        </div>
    </div>

    <!-- History seek bar (always visible when no replay active) -->
    <div class="seek-bar" id="seek-bar">
        <button class="seek-pause-btn" id="header-pause-btn" title="Pause/Resume">&#9646;&#9646;</button>
        <span class="seek-time" id="seek-time">0:00</span>
        <div class="seek-track-wrap" id="seek-track-wrap">
            <input type="range" class="seek-slider" id="seek-slider" min="0" max="0" value="0">
            <div class="seek-laps" id="seek-laps"></div>
        </div>
        <button class="seek-live-btn active" id="seek-live-btn">LIVE</button>
    </div>

    <!-- Replay controls bar (hidden unless replay active) -->
    <div class="replay-bar" id="replay-bar">
        <div class="replay-lap-group" id="replay-lap-group" style="display:none">
            <button class="replay-lap-btn" id="replay-lap-btn">Lap --</button>
            <div class="replay-lap-menu" id="replay-lap-menu"></div>
        </div>
        <div class="replay-seek-wrap" id="replay-seek-wrap">
            <input type="range" class="replay-seek" id="replay-seek" min="0" max="1000" value="0">
        </div>
        <div class="replay-time" id="replay-time">0:00.0 / 0:00.0</div>
        <button class="replay-btn replay-nav-btn" id="replay-prev-lap" title="Previous lap (PgUp)">&#9198;</button>
        <button class="replay-btn" id="replay-play-pause" title="Play/Pause (Space)">&#9654;</button>
        <button class="replay-btn replay-nav-btn" id="replay-next-lap" title="Next lap (PgDn)">&#9197;</button>
        <div class="replay-speed-group">
            <button class="speed-btn" data-speed="0.25">0.25x</button>
            <button class="speed-btn" data-speed="0.5">0.5x</button>
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="2">2x</button>
            <button class="speed-btn" data-speed="4">4x</button>
        </div>
        <div class="replay-loop-group">
            <button class="replay-loop-btn" id="replay-loop-start" title="Set loop start ([)">[</button>
            <button class="replay-loop-btn" id="replay-loop-end" title="Set loop end (])">]</button>
            <button class="replay-loop-btn" id="replay-loop-toggle" title="Toggle loop (L)">Loop</button>
        </div>
        <button class="replay-exit-btn" id="replay-exit">Exit</button>
    </div>

    <div id="dashboard-grid" class="grid-stack"></div>

    <script>
/* __SCRIPTS__ */
    </script>
</body>
</html>
